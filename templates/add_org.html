{% extends 'base.html' %}
{% block content %}
<div class="form-container widget">
    <h2>Add New Organization</h2>
    <form method="POST" action="{{ url_for('organizations.add_org') }}" class="modern-form" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Organization Name</label>
            <input type="text" id="name" name="name" required placeholder="e.g. Memorial University">
        </div>
        <div class="form-group">
            <label for="logo">Organization Logo (Optional)</label>
            <input type="file" id="logo" name="logo" accept="image/*">
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="address_1">Address Line 1</label>
                <input type="text" id="address_1" name="address_1">
            </div>
            <div class="form-group">
                <label for="address_2">Address Line 2 (Optional)</label>
                <input type="text" id="address_2" name="address_2">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state">
            </div>
            <div class="form-group">
                <label for="zip_code">Zip Code</label>
                <input type="text" id="zip_code" name="zip_code">
            </div>
        </div>
        <div style="display:grid; grid-template-columns:1fr 1fr; gap:1rem;">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Organization</button>
            <a href="{{ url_for('organizations.list_orgs') }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
