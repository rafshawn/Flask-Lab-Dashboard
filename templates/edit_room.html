{% extends 'base.html' %}
{% block content %}
<div class="form-container widget">
    <h2>Edit Room: {{ room.room_no }}</h2>
    <form method="POST" action="{{ url_for('organizations.edit_room', id=room.id) }}" class="modern-form">
        <div class="form-group">
            <label for="floor_id">Select Floor</label>
            <select id="floor_id" name="floor_id" required>
                <option value="">-- Select a Floor --</option>
                {% for floor in floors %}
                <option value="{{ floor.id }}" {% if floor.id == room.floor_id %}selected{% endif %}>
                    {{ floor.building.name }} - Floor {{ floor.floor_number }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="form-group">
            <label for="room_no">Room Number / Name</label>
            <input type="text" id="room_no" name="room_no" required value="{{ room.room_no }}">
        </div>
        <div class="form-group" style="display:flex; align-items:center; gap:0.5rem;">
            <input type="checkbox" id="is_active" name="is_active" {% if room.is_active %}checked{% endif %} style="width: auto;">
            <label for="is_active" style="margin: 0;">Is Active Lab Space?</label>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('organizations.room_detail', id=room.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
