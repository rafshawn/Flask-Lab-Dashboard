{% extends 'base.html' %}
{% block content %}
<div class="form-container widget">
    <h2>Edit Organization: {{ org.name }}</h2>
    <form method="POST" action="{{ url_for('organizations.edit_org', id=org.id) }}" class="modern-form" enctype="multipart/form-data">
        <div class="form-group">
            <label for="name">Organization Name</label>
            <input type="text" id="name" name="name" required value="{{ org.name }}">
        </div>
        <div class="form-group">
            <label for="logo">Organization Logo (Optional - upload new to replace)</label>
            <input type="file" id="logo" name="logo" accept="image/*">
            {% if org.logo_path %}
            <small class="d-block mt-2 text-muted">Current logo: {{ org.logo_path.split('/')[-1] }}</small>
            {% endif %}
        </div>
        <div class="d-grid grid-2 gap-4">
            <div class="form-group">
                <label for="address_1">Address Line 1</label>
                <input type="text" id="address_1" name="address_1" value="{{ org.address_1 or '' }}">
            </div>
            <div class="form-group">
                <label for="address_2">Address Line 2 (Optional)</label>
                <input type="text" id="address_2" name="address_2" value="{{ org.address_2 or '' }}">
            </div>
        </div>
        <div class="d-grid grid-3 gap-4">
            <div class="form-group">
                <label for="city">City</label>
                <input type="text" id="city" name="city" value="{{ org.city or '' }}">
            </div>
            <div class="form-group">
                <label for="state">State</label>
                <input type="text" id="state" name="state" value="{{ org.state or '' }}">
            </div>
            <div class="form-group">
                <label for="zip_code">Zip Code</label>
                <input type="text" id="zip_code" name="zip_code" value="{{ org.zip_code or '' }}">
            </div>
        </div>
        <div class="d-grid grid-2 gap-4">
            <div class="form-group">
                <label for="phone">Phone</label>
                <input type="text" id="phone" name="phone" value="{{ org.phone or '' }}">
            </div>
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ org.email or '' }}">
            </div>
        </div>
        <div class="form-actions">
            <button type="submit" class="btn-primary">Save Changes</button>
            <a href="{{ url_for('organizations.org_detail', id=org.id) }}" class="btn-secondary">Cancel</a>
        </div>
    </form>
</div>
{% endblock %}
