{% extends 'base.html' %}
{% block content %}
<div class="page-header">
    <h1>Rooms</h1>
    <a href="{{ url_for('organizations.add_room') }}" class="btn-primary">Add Room</a>
</div>
<div class="widget-container" style="grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
    {% for room in rooms %}
    <div class="widget room-card" onclick="window.location.href='{{ url_for('organizations.room_detail', id=room.id) }}'" style="cursor: pointer; transition: transform 0.2s;">
        <h3>{{ room.building_name }}</h3>
        <p class="text-muted">Rm {{ room.room_no }}</p>
        <div class="mt-4">
            <span class="badge badge-active">{{ room.hoods|length }} Hood(s)</span>
        </div>
    </div>
    {% else %}
    <p>No rooms found.</p>
    {% endfor %}
</div>
{% endblock %}
