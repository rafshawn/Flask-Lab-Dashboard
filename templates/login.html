<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — O2 Fumehoods</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css', v=3) }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <i class="fa-solid fa-flask login-icon"></i>
                <h1>O2 Fumehoods</h1>
                <p class="text-muted">Sign in to your account</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="login-alert">
                      <i class="fa-solid fa-circle-exclamation"></i> {{ message }}
                  </div>
                {% endfor %}
              {% endif %}
            {% endwith %}

            <form method="POST" action="{{ url_for('auth.login') }}" class="login-form">
                <div class="login-field">
                    <label for="username">Username</label>
                    <div class="login-input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" id="username" name="username" value="admin" placeholder="Enter username" autocomplete="username">
                    </div>
                </div>
                <div class="login-field">
                    <label for="password">Password</label>
                    <div class="login-input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" id="password" name="password" value="admin" placeholder="Enter password" autocomplete="current-password">
                    </div>
                </div>
                <button type="submit" class="login-btn">
                    <i class="fa-solid fa-right-to-bracket"></i> Sign In
                </button>
            </form>

            <div class="login-footer">
                <p><i class="fa-solid fa-circle-info"></i> Demo credentials: <strong>admin</strong> / <strong>admin</strong></p>
            </div>
        </div>
    </div>

    <script>
        // Apply saved theme
        const currentTheme = localStorage.getItem('theme') || 'dark';
        if (currentTheme === 'light') {
            document.body.classList.add('light-mode');
        }
    </script>
</body>
</html>
